name: Play Store Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Upload track'
        required: true
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]
      rollout_fraction:
        description: 'Staged rollout for production (0.0–1.0; ignored for non-prod tracks)'
        required: false
        default: '0.05'

permissions:
  contents: write

jobs:
  play-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Play publisher deps
        run: pip install --quiet google-auth google-api-python-client

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.PLAY_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/pulseboard.jks"
          echo "PULSEBOARD_KEYSTORE_PATH=$RUNNER_TEMP/pulseboard.jks" >> "$GITHUB_ENV"

      - name: Decode service account JSON
        env:
          SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          chmod 600 "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Stage publisher script
        run: |
          # Vendored at scripts/google-play-publisher.py in the repo.
          # Source of truth: ~/.claude/scripts/google-play-publisher.py on the
          # maintainer's workstation. Sync via `cp` when the script changes.
          chmod +x scripts/google-play-publisher.py
          echo "PUBLISHER=$(pwd)/scripts/google-play-publisher.py" >> "$GITHUB_ENV"

      - name: Build AAB
        env:
          PULSEBOARD_KEYSTORE_PASSWORD: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          PULSEBOARD_KEY_ALIAS: ${{ secrets.PLAY_KEY_ALIAS }}
          PULSEBOARD_KEY_PASSWORD: ${{ secrets.PLAY_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease

      - name: Determine track & release notes
        id: plan
        run: |
          TRACK="${{ github.event.inputs.track || 'internal' }}"
          echo "track=$TRACK" >> "$GITHUB_OUTPUT"
          VC=$(grep -E 'versionCode\s*=' app/build.gradle.kts | head -1 | grep -oE '[0-9]+')
          echo "version_code=$VC" >> "$GITHUB_OUTPUT"
          NOTES_FILE="metadata/android/en-US/changelogs/$VC.txt"
          if [ -f "$NOTES_FILE" ]; then
            NOTES=$(cat "$NOTES_FILE")
          else
            NOTES="Release v$VC (no changelog found at $NOTES_FILE)"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Play (track=${{ steps.plan.outputs.track }})
        run: |
          python3 "$PUBLISHER" upload \
            --package com.cramraika.pulseboard \
            --aab app/build/outputs/bundle/release/app-release.aab \
            --track "${{ steps.plan.outputs.track }}" \
            --release-name "v${{ steps.plan.outputs.version_code }}"

      - name: Attach release notes
        run: |
          python3 "$PUBLISHER" release \
            --package com.cramraika.pulseboard \
            --version-code ${{ steps.plan.outputs.version_code }} \
            --track "${{ steps.plan.outputs.track }}" \
            --release-name "v${{ steps.plan.outputs.version_code }}" \
            --status "$([ '${{ steps.plan.outputs.track }}' = 'production' ] && echo draft || echo completed)" \
            --notes-en "${{ steps.plan.outputs.notes }}"

      - name: Staged rollout (production only)
        if: steps.plan.outputs.track == 'production'
        run: |
          python3 "$PUBLISHER" rollout \
            --package com.cramraika.pulseboard \
            --track production \
            --fraction "${{ github.event.inputs.rollout_fraction || '0.05' }}"

      - name: Publish GitHub Release artifact (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
